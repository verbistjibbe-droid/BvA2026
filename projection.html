<!DOCTYPE html>
<html lang="nl">
<head>
<script type="module">
</script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BvA - Projectie</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="projection-body">
  <div class="projection-shell">
    <div class="main-display">
      <div class="home-players">
        <div class="team-title" id="homeTeamTitle">THUIS</div>
        <div id="homeProjectionPlayers" class="projection-list"></div>
      </div>

      <div class="center-score">
        <div class="scoreboard">
          <div class="score-block score-home">
            <div class="team-name" id="projHomeName">ZUIDERKEMPEN</div>
            <div class="team-score" id="projHomeScore">0</div>
          </div>
          <div class="match-info">
            <div class="period">-</div>
          </div>
          <div class="score-block score-away">
            <div class="team-name" id="projAwayName">TEAM WITHOUT NAME</div>
            <div class="team-score" id="projAwayScore">0</div>
          </div>
        </div>
        <div class="period-display" id="periodDisplay">PERIODE 1</div>
      </div>

      <div class="away-players">
        <div class="team-title" id="awayTeamTitle">BEZOEKERS</div>
        <div id="awayProjectionPlayers" class="projection-list"></div>
      </div>
    </div>

    <div id="popup" class="popup"></div>
    <div id="pregameOverlay" class="pregame-overlay hidden">
      <div class="pregame-content">
        <div class="pregame-mode" id="pregameModeLabel">FINALE BEKER VAN ANTWERPEN</div>
        <div class="pregame-team-label hidden" id="pregameTeamLabel"></div>
        <div class="pregame-player-row hidden" id="pregamePlayerRow">
          <div class="pregame-number" id="pregamePlayerNumber">00</div>
          <div class="pregame-player-name" id="pregamePlayerName">SPELER NAAM</div>
        </div>
      </div>
    </div>
    <div id="timeoutPopup" class="countdown-popup hidden">
      <div class="popup-with-score">
        <div class="countdown-content">
          <div class="countdown-title" id="timeoutTitle">TIME-OUT</div>
        </div>
        <div class="scoreboard compact">
          <div class="score-block score-home">
            <div class="team-name" id="timeoutProjHomeName">ZUIDERKEMPEN</div>
            <div class="team-score" id="timeoutProjHomeScore">0</div>
          </div>
          <div class="score-block score-away">
            <div class="team-name" id="timeoutProjAwayName">TEAM WITHOUT NAME</div>
            <div class="team-score" id="timeoutProjAwayScore">0</div>
          </div>
        </div>
        <div class="timeout-bottom-score last-score-display" id="timeoutLastScoreDisplay">Laatste score: geen recente score</div>
        <div class="popup-actions"></div>
      </div>
    </div>
    <div id="halftimePopup" class="countdown-popup hidden">
      <div class="popup-with-score halftime-popup">
        <div class="countdown-content halftime-header">
          <div class="countdown-title">HALFTIME SHOW</div>
        </div>
        <div class="scoreboard halftime-scoreboard">
          <div class="score-block score-home">
            <div class="team-name" id="halftimeProjHomeName">ZUIDERKEMPEN</div>
            <div class="team-score" id="halftimeProjHomeScore">0</div>
          </div>
          <div class="score-block score-away">
            <div class="team-name" id="halftimeProjAwayName">TEAM WITHOUT NAME</div>
            <div class="team-score" id="halftimeProjAwayScore">0</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="projection.js"></script>
  <script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyD95lVPSZ5i-RGsDhzUT5osLO0zO0pDPSQ",
  authDomain: "bva2026projectie.firebaseapp.com",
  databaseURL: "https://bva2026projectie-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "bva2026projectie",
  storageBucket: "bva2026projectie.firebasestorage.app",
  messagingSenderId: "33248904631",
  appId: "1:33248904631:web:f931c1b853c6b74bf05432",
  measurementId: "G-3KRWHBV5RB"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

onValue(ref(db, "projectie/tekst"), (snapshot) => {
  document.getElementById("screen").innerText = snapshot.val() || "";
});
</script>
</body>
</html>
